<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>정형외과 AI OS · 글래스 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>/* FOUC 방지: 페인트 전에 테마 확정 */(function(){try{var p=localStorage.getItem('aios_glass_theme')||'system';var d=p==='dark'||(p==='system'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
<style>
  :root{
    --ink:#0f2e3d; --ink2:#4d6c79; --ink3:#86a1ab;
    --cyan:#0891b2; --cyan-d:#0e6f86; --teal:#0e7d8f;
    --green:#059669; --amber:#d97706; --red:#dc2626; --violet:#7c6cf0;
    --glass:rgba(255,255,255,.60);
    --glass-strong:rgba(255,255,255,.80);
    --glass-soft:rgba(255,255,255,.42);
    --glass-bd:rgba(255,255,255,.65);
    --glass-bd-soft:rgba(255,255,255,.4);
    --shadow:0 8px 30px rgba(16,62,90,.10);
    --shadow-lift:0 14px 40px rgba(16,62,90,.16);
    --r:18px; --r-sm:12px;
    --blur:blur(18px) saturate(165%);
    --track-bg:rgba(15,46,61,.12);
  }
  html[data-theme="light"]{color-scheme:light}
  /* ===== 다크 테마 (글래스 그대로, 톤만 반전) ===== */
  html[data-theme="dark"]{
    color-scheme:dark;
    --ink:#e9f1f5; --ink2:#a7bcc6; --ink3:#728d9a;
    --cyan:#19b0d0; --cyan-d:#46d3ec; --teal:#2bb7c9;
    --green:#2fcf94; --amber:#f0b343; --red:#ff6b6b; --violet:#9a8cf5;
    --glass:rgba(22,41,54,.55);
    --glass-strong:rgba(30,53,68,.85);
    --glass-soft:rgba(22,41,54,.40);
    --glass-bd:rgba(150,180,195,.16);
    --glass-bd-soft:rgba(150,180,195,.10);
    --shadow:0 8px 30px rgba(0,0,0,.40);
    --shadow-lift:0 14px 40px rgba(0,0,0,.52);
    --track-bg:rgba(255,255,255,.14);
  }
  html[data-theme="dark"] body{background:#0c1a22}
  html[data-theme="dark"] body::before{
    background:
      radial-gradient(at 16% 18%, rgba(34,211,238,.16), transparent 46%),
      radial-gradient(at 82% 10%, rgba(8,145,178,.14), transparent 42%),
      radial-gradient(at 78% 82%, rgba(5,150,105,.12), transparent 44%),
      radial-gradient(at 22% 88%, rgba(124,108,240,.16), transparent 48%),
      linear-gradient(135deg,#0c1a22,#0a151c);
  }
  /* 다크: 하드코딩 구분선/트랙 보정 (라이트→다크) */
  html[data-theme="dark"] .brand,
  html[data-theme="dark"] .side-foot,
  html[data-theme="dark"] .mini-row,
  html[data-theme="dark"] .c-foot,
  html[data-theme="dark"] .rs-head{border-color:rgba(255,255,255,.09)}
  html[data-theme="dark"] .main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16)}
  html[data-theme="dark"] .switch{background:rgba(255,255,255,.22)}
  html[data-theme="dark"] .risk-bar,
  html[data-theme="dark"] .pace-track,
  html[data-theme="dark"] .gs-slider input[type=range]{background:rgba(255,255,255,.12)}
  html[data-theme="dark"] .icon-btn .dot{border-color:#13222b}
  html[data-theme="dark"] .nav-item .nm-t.editing{background:rgba(255,255,255,.12)}
  html[data-theme="dark"] .sortable-ph{background:rgba(124,108,240,.12)}
  /* ===== 테마 전환 세그먼트 (시스템 / 라이트 / 다크) ===== */
  .theme-seg{display:inline-flex;gap:2px;padding:3px;border-radius:11px;border:1px solid var(--glass-bd-soft);background:var(--glass-soft)}
  .ts-btn{width:30px;height:30px;border:none;background:none;border-radius:8px;color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
  .ts-btn svg{width:16px;height:16px}
  .ts-btn:hover{color:var(--ink2)}
  .ts-btn.on{background:var(--glass-strong);color:var(--cyan-d);box-shadow:var(--shadow)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;
    color:var(--ink); font-size:14px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
    background:#e8f0f3;
    overflow:hidden;
  }
  /* mesh background — gives the glass something to frost */
  body::before{
    content:""; position:fixed; inset:0; z-index:-1;
    background:
      radial-gradient(at 16% 18%, rgba(34,211,238,.34), transparent 46%),
      radial-gradient(at 82% 10%, rgba(8,145,178,.26), transparent 42%),
      radial-gradient(at 78% 82%, rgba(5,150,105,.20), transparent 44%),
      radial-gradient(at 22% 88%, rgba(124,108,240,.18), transparent 48%),
      linear-gradient(135deg,#eef5f7,#e3eef1);
    animation:drift 26s ease-in-out infinite alternate;
  }
  @keyframes drift{to{transform:scale(1.08) translate(-2%, -1%)}}
  .mono{font-family:"Fira Code",ui-monospace,monospace;font-feature-settings:"tnum"}

  /* shell */
  .app{display:grid;grid-template-columns:248px 1fr;height:100vh;gap:0}

  /* sidebar */
  .side{
    margin:14px 0 14px 14px; padding:16px 14px;
    background:var(--glass); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    border:1px solid var(--glass-bd); border-radius:var(--r);
    box-shadow:var(--shadow); display:flex; flex-direction:column; gap:6px;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 14px;margin-bottom:6px;border-bottom:1px solid rgba(15,46,61,.08)}
  .brand .mark{width:38px;height:38px;border-radius:11px;flex-shrink:0;
    background:linear-gradient(135deg,var(--cyan),var(--green));color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;
    box-shadow:0 4px 14px rgba(8,145,178,.35)}
  .brand .bt{font-size:14.5px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
  .brand .bs{font-size:11px;color:var(--ink3);font-weight:500;margin-top:2px}
  .nav-label{font-size:10.5px;font-weight:700;color:var(--ink3);letter-spacing:.6px;padding:8px 10px 4px}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--r-sm);
    cursor:pointer;color:var(--ink2);font-weight:600;font-size:13px;
    transition:background .18s,color .18s,box-shadow .18s; border:1px solid transparent; position:relative;
  }
  .nav-item:hover{background:var(--glass-soft);color:var(--ink)}
  .nav-item.active{
    background:var(--glass-strong);color:var(--cyan-d);border-color:var(--glass-bd);
    box-shadow:0 4px 14px rgba(8,145,178,.14)}
  .nav-item.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:3px;height:18px;border-radius:3px;background:linear-gradient(var(--cyan),var(--green))}
  .nav-item svg{width:19px;height:19px;flex-shrink:0}
  .nav-item .nm{flex:1;min-width:0}
  .nav-item .ds{font-size:10.5px;color:var(--ink3);font-weight:500;display:block;margin-top:1px}
  .nav-item.active .ds{color:var(--cyan)}
  .nav-badge{font-family:"Fira Code",monospace;font-size:10.5px;font-weight:600;min-width:20px;text-align:center;
    padding:1px 6px;border-radius:20px;background:rgba(220,38,38,.12);color:var(--red)}
  .side-foot{margin-top:auto;padding-top:12px;border-top:1px solid rgba(15,46,61,.08)}

  /* main */
  .main{overflow-y:auto;padding:14px 18px 28px}
  .main::-webkit-scrollbar{width:9px}
  .main::-webkit-scrollbar-thumb{background:rgba(15,46,61,.16);border-radius:8px;border:2px solid transparent;background-clip:padding-box}

  /* topbar */
  .top{
    display:flex;align-items:center;gap:14px;
    padding:13px 18px; margin-bottom:18px;
    background:var(--glass); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    border:1px solid var(--glass-bd); border-radius:var(--r); box-shadow:var(--shadow);
  }
  .greet{font-size:13px;color:var(--ink2)}
  .greet b{color:var(--ink);font-weight:700}
  .top .sp{flex:1}
  .search{display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:11px;
    background:var(--glass-soft);border:1px solid var(--glass-bd-soft);color:var(--ink3);min-width:210px}
  .search svg{width:16px;height:16px;flex-shrink:0}
  .search input{border:none;background:none;outline:none;font-family:inherit;font-size:13px;color:var(--ink);width:100%}
  .search input::placeholder{color:var(--ink3)}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--glass-bd-soft);
    background:var(--glass-soft);color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:background .18s,color .18s;position:relative}
  .icon-btn:hover{background:var(--glass-strong);color:var(--cyan-d)}
  .icon-btn svg{width:18px;height:18px}
  .icon-btn .dot{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid #fff}
  .who{display:flex;align-items:center;gap:9px}
  .who .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--cyan));
    color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
  .who .wt{font-size:12.5px;font-weight:700;line-height:1.2}
  .who .ws{font-size:10.5px;color:var(--ink3)}

  /* board header */
  .board-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin:2px 2px 16px;flex-wrap:wrap}
  .board-head h1{font-size:21px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
  .board-head h1 .hi{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    background:var(--glass-strong);color:var(--cyan-d);border:1px solid var(--glass-bd)}
  .board-head h1 .hi svg{width:18px;height:18px}
  .board-head .sub{font-size:12px;color:var(--ink2);margin-top:3px;font-weight:500}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{font-size:11.5px;font-weight:600;padding:6px 13px;border-radius:20px;cursor:pointer;
    background:var(--glass-soft);border:1px solid var(--glass-bd-soft);color:var(--ink2);transition:all .18s}
  .chip:hover{background:var(--glass-strong);color:var(--ink)}
  .chip.on{background:var(--cyan);border-color:var(--cyan);color:#fff;box-shadow:0 4px 12px rgba(8,145,178,.3)}

  /* card grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:16px;align-items:start}
  .card{
    background:var(--glass); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    border:1px solid var(--glass-bd); border-radius:var(--r); box-shadow:var(--shadow);
    padding:17px 18px; transition:transform .2s ease,box-shadow .2s ease,border-color .2s; cursor:default;
    animation:rise .45s cubic-bezier(.16,1,.3,1) backwards;
  }
  .card.click{cursor:pointer}
  .card.click:hover{transform:translateY(-4px);box-shadow:var(--shadow-lift);border-color:rgba(8,145,178,.4)}
  .card.span2{grid-column:span 2}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}}

  .c-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .c-title{font-size:13px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
  .c-title .ci{color:var(--cyan-d);display:flex}
  .c-title .ci svg{width:16px;height:16px}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .b-red{background:rgba(220,38,38,.12);color:var(--red)}
  .b-amber{background:rgba(217,119,6,.14);color:var(--amber)}
  .b-green{background:rgba(5,150,105,.13);color:var(--green)}
  .b-cyan{background:rgba(8,145,178,.13);color:var(--cyan-d)}
  .b-gray{background:rgba(77,108,121,.12);color:var(--ink2)}

  /* KPI */
  .kpi .k-val{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
  .kpi .k-val small{font-size:15px;font-weight:700;color:var(--ink2);margin-left:2px}
  .kpi .k-delta{font-size:11.5px;font-weight:600;margin-top:9px;display:flex;align-items:center;gap:5px}
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--ink2)}
  .k-spark{height:34px;margin-top:12px;display:flex;align-items:flex-end;gap:3px}
  .k-spark i{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(var(--cyan),rgba(8,145,178,.25));opacity:.85}

  /* ring gauge KPI (ref: KYR 부동산 대시보드) */
  .big-num{font-size:38px;font-weight:800;letter-spacing:-1.5px;line-height:1;margin:6px 0 8px}
  .big-num small{font-size:17px;font-weight:700;color:var(--ink2);margin-left:3px}
  .kpi-ring .ring-row{display:flex;align-items:center;gap:14px}
  .ring-svg{flex-shrink:0}
  .rk-label{font-size:13.5px;font-weight:700}
  .rk-sub{font-size:11px;color:var(--ink2);margin-top:3px;line-height:1.4}
  .rk-delta{font-size:11.5px;font-weight:600;margin-top:7px}
  /* violet gradient feature card (ref: 火山方舟 콘솔) */
  .card.feature{background:linear-gradient(135deg,#6a5af0,#8b6cf0 42%,#4f8ff0);border-color:rgba(255,255,255,.28);
    box-shadow:0 12px 34px rgba(91,80,200,.30);backdrop-filter:none;-webkit-backdrop-filter:none}
  .card.feature,.card.feature .c-title,.card.feature .c-foot{color:#fff}
  .card.feature .meta{color:rgba(255,255,255,.92)} .card.feature .meta b{color:#fff;font-weight:800}
  .card.feature .c-title .ci{color:rgba(255,255,255,.85)}
  .card.feature .badge{background:rgba(255,255,255,.22);color:#fff}
  .card.feature .c-foot{border-top-color:rgba(255,255,255,.25);color:rgba(255,255,255,.86)}
  .card.feature .pace-track{background:rgba(255,255,255,.28)}
  .card.feature .pace-track .now{background:#fff} .card.feature .pace-track .mk{background:#fff}

  /* 조립·편집 모드 */
  .card{position:relative}
  .mini-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid rgba(15,46,61,.07)}
  .asm-btn{display:flex;align-items:center;gap:7px;padding:9px 13px;border-radius:11px;border:1px solid var(--glass-bd-soft);
    background:var(--glass-soft);color:var(--ink2);font-family:inherit;font-weight:600;font-size:12.5px;cursor:pointer;
    transition:background .18s,color .18s,box-shadow .18s;white-space:nowrap}
  .asm-btn:hover{background:var(--glass-strong);color:var(--cyan-d)}
  .asm-btn svg{width:17px;height:17px}
  .asm-btn.on{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 4px 12px rgba(124,108,240,.35)}
  .gallery{display:none;margin:0 2px 16px;padding:14px 16px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
    border:1px solid var(--glass-bd);border-radius:var(--r);box-shadow:var(--shadow)}
  .gallery.show{display:block;animation:rise .35s cubic-bezier(.16,1,.3,1)}
  .gal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;font-size:11.5px;color:var(--ink2);font-weight:600}
  .gal-head b{color:var(--ink);font-weight:700}
  .gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}
  .gitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;
    background:var(--glass-soft);border:1px solid var(--glass-bd-soft);transition:background .18s,border-color .18s}
  .gitem:hover{background:var(--glass-strong)}
  .gitem.on{border-color:rgba(8,145,178,.4);background:var(--glass-strong)}
  .gi-body{flex:1;min-width:0}
  .gi-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gi-desc{font-size:10.5px;color:var(--ink3);margin-top:1px}
  .gi-empty{font-size:11px;color:var(--ink3);padding:8px 4px}
  .switch{width:34px;height:19px;border-radius:20px;background:rgba(15,46,61,.18);position:relative;flex-shrink:0;transition:background .18s}
  .switch::after{content:"";position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .gitem.on .switch{background:var(--cyan)}
  .gitem.on .switch::after{left:17px}
  .x-btn{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:8px;display:none;align-items:center;justify-content:center;
    border:1px solid var(--glass-bd);background:var(--glass-strong);color:var(--ink2);cursor:pointer;z-index:3;padding:0}
  .x-btn:hover{color:var(--red);border-color:rgba(220,38,38,.45)}
  body.assemble .x-btn{display:flex}
  body.assemble .grid .card{outline:1.5px dashed rgba(124,108,240,.5);outline-offset:-2px;cursor:grab}
  body.assemble .grid .card:active{cursor:grabbing}
  .card.dragging{opacity:.4;outline:2px solid var(--violet)!important;box-shadow:var(--shadow-lift)}
  .grid.drag-on .card.click:hover{transform:none;box-shadow:var(--shadow)}
  .nav-x{display:none;position:absolute;right:9px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:6px;
    align-items:center;justify-content:center;border:1px solid var(--glass-bd-soft);background:var(--glass-strong);color:var(--ink2);cursor:pointer;padding:0}
  .nav-x:hover{color:var(--red);border-color:rgba(220,38,38,.4)}
  body.assemble .nav-x{display:flex}
  body.assemble .nav-badge{display:none}
  /* 카드 너비 리사이즈 버튼 */
  .r-btn{position:absolute;top:10px;right:40px;height:24px;min-width:30px;padding:0 6px;border-radius:8px;display:none;align-items:center;justify-content:center;gap:3px;
    border:1px solid var(--glass-bd);background:var(--glass-strong);color:var(--ink2);cursor:pointer;z-index:3;font:600 10px/1 'Fira Code',monospace}
  .r-btn:hover{color:var(--violet);border-color:rgba(124,108,240,.5)}
  .r-btn svg{width:13px;height:13px}
  /* 사이드바 게시판 드래그·이름변경 */
  body.assemble .nav-item{cursor:grab}
  body.assemble .nav-item:active{cursor:grabbing}
  .nav-item.nav-drag{opacity:.4;outline:2px solid var(--violet);outline-offset:-2px}
  .nav-item .nm-t{display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom}
  .nav-item .nm-t.editing{outline:1.5px solid var(--cyan);border-radius:5px;padding:0 4px;background:rgba(255,255,255,.6);cursor:text;color:var(--ink);white-space:normal}
  /* 포인터 드래그(FLIP) — 부드러운 들어올림 + 자리비움 */
  body.dragging-active{user-select:none;-webkit-user-select:none;cursor:grabbing}
  .card.drag-lift{outline:none!important;cursor:grabbing;border-radius:18px;
    box-shadow:0 24px 50px -14px rgba(15,46,61,.5), 0 0 0 1.5px rgba(124,108,240,.55)!important;transition:none}
  .nav-item.drag-lift{outline:none!important;cursor:grabbing;border-radius:12px;background:var(--glass-strong);
    box-shadow:0 16px 34px -12px rgba(15,46,61,.45), 0 0 0 1.5px rgba(124,108,240,.5)}
  .sortable-ph{border:2px dashed rgba(124,108,240,.55);border-radius:16px;background:rgba(124,108,240,.07);box-sizing:border-box}
  /* 조립 트레이 (새 카드 + 숨긴 카드 복원) */
  .tray-card{display:flex;flex-direction:column;gap:12px;justify-content:center;cursor:default;
    background:rgba(124,108,240,.05);outline:1.5px dashed rgba(124,108,240,.5)!important;outline-offset:-2px}
  .tray-new{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;cursor:pointer;

function ringGauge(pct, color, label, sub, delta, deltaCls){
  const r=34, c=2*Math.PI*r, dash=(pct/100)*c;
  return `<div class="card kpi-ring">
    <div class="ring-row">
      <svg class="ring-svg" viewBox="0 0 80 80" width="82" height="82" role="img" aria-label="${label} ${pct}%">
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="rgba(15,46,61,.09)" stroke-width="8"/>
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${dash.toFixed(1)} ${(c-dash).toFixed(1)}" transform="rotate(-90 40 40)"/>
        <text x="40" y="40" text-anchor="middle" dominant-baseline="central" font-family="Fira Code,monospace" font-size="17" font-weight="700" fill="#0f2e3d">${pct}%</text>
      </svg>
      <div><div class="rk-label">${label}</div><div class="rk-sub">${sub}</div><div class="rk-delta ${deltaCls}">${delta}</div></div>
    </div>
  </div>`;
}

        ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">${dates.map(d=>`<button class="chip" type="button" data-restore="${d}" title="${d} 저장본으로 되돌리기">${d}</button>`).join('')}</div>`
        : '';
      return `<div class="card span2"><div class="c-head"><div class="c-title"><span class="ci">${ic('sync',16)}</span>변경 기록</div><span class="badge b-cyan">${changelog.length}건</span></div>${rows}${chips}<div class="c-foot"><span>날짜별 저장 ${dates.length}일 · 브라우저 localStorage</span><span class="badge b-gray">자동 저장</span></div></div>`;
    }, init(root){ root.querySelectorAll('[data-restore]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); restoreSnapshot(b.dataset.restore); })); } },
  ],
};

/* ===== 일일 운영: 지속 입력 → 진단 (localStorage 시계열, 실입력 기반) ===== */
const DKEY='aios_daily_v1';
const DAILY_FIELDS=[
  ['환자(명)','sinhwan','신환'],['환자(명)','jaejin','재진'],['환자(명)','yeyak','예약'],['환자(명)','nosho','노쇼'],
  ['매출(원)','geupyeo','급여'],['매출(원)','dosu','도수'],['매출(원)','chunggyeok','충격파'],['매출(원)','jusa','비급여주사'],['매출(원)','bojogi','보조기·기타'],
  ['청구·현금(원)','boheom','보험청구액'],['청구·현금(원)','sakgam','삭감액'],['청구·현금(원)','sugeum','당일수금'],['청구·현금(원)','byeondongbi','변동비'],
];
const DSET_FIELDS=[['mokpyo','월 목표매출(원)'],['gojeongbi','월 고정비(원)'],['gibyeoul','공헌이익률(0~1)'],['sugeumTarget','수금률 목표(0~1)'],['noshoWarn','노쇼율 경고선(0~1)'],['sakgamWarn','삭감률 경고선(0~1)'],['cash','현재 현금잔고(원)']];
const DAILY_DEF_SET={ mokpyo:182000000, gojeongbi:62000000, gibyeoul:0.42, sugeumTarget:0.95, noshoWarn:0.08, sakgamWarn:0.04, cash:84000000 };
function loadDaily(){ let o=null; try{ o=JSON.parse(localStorage.getItem(DKEY)||'null'); }catch(_){ } return { settings:{...DAILY_DEF_SET, ...((o&&o.settings)||{})}, days:(o&&o.days)||{} }; }
let dailyData = loadDaily();
function saveDaily(){ try{ localStorage.setItem(DKEY, JSON.stringify(dailyData)); }catch(_){ } }
function dyToday(){ const d=new Date(), z=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function dyTotal(r){ return (+r.geupyeo||0)+(+r.dosu||0)+(+r.chunggyeok||0)+(+r.jusa||0)+(+r.bojogi||0); }
function dyNonSal(r){ return (+r.dosu||0)+(+r.chunggyeok||0)+(+r.jusa||0)+(+r.bojogi||0); }
function dyDates(){ return Object.keys(dailyData.days).sort(); }
function dyWon(n){ return Math.round(n).toLocaleString()+'원'; }
function dyMan(n){ return Math.round(n/10000).toLocaleString()+'만'; }
function dyPct(n){ return (n*100).toFixed(1)+'%'; }
function dyCommas(v){ v=String(v).replace(/,/g,'').trim(); if(v==='') return ''; const neg=v[0]==='-'?'-':''; v=v.replace(/[^0-9.]/g,''); const p=v.split('.'); p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,','); return neg+(p.length>1?p[0]+'.'+p.slice(1).join(''):p[0]); }
function dyNum(v){ return +String(v).replace(/,/g,'')||0; }
function dyWireNum(root){ root.querySelectorAll('[data-dyf],[data-dset],[data-mkf],[data-mset]').forEach(i=>{ i.addEventListener('focus',()=>{ i.value=String(i.value).replace(/,/g,''); }); i.addEventListener('blur',()=>{ if(String(i.value).trim()!=='') i.value=dyCommas(i.value); }); }); }
function dySpark(vals,color){ if(!vals.length)return''; const max=Math.max(...vals,1),w=128,h=32,bw=w/vals.length;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">${vals.map((v,i)=>{const bh=Math.max(2,(v/max)*(h-2));return `<rect x="${(i*bw+1).toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${(bw-2).toFixed(1)}" height="${bh.toFixed(1)}" rx="1.5" fill="${color}" opacity="0.8"/>`;}).join('')}</svg>`; }

function dyDiagnose(){
  const ds=dyDates(), S=dailyData.settings;
  if(!ds.length) return {signal:'none', days:0};
  const recent=ds.slice(-30).map(d=>({d,...dailyData.days[d]}));
  let tot=0,nonsal=0,boheom=0,sakgam=0,sugeum=0,byeon=0,nosho=0,yeyak=0;
  recent.forEach(r=>{ tot+=dyTotal(r); nonsal+=dyNonSal(r); boheom+=(+r.boheom||0); sakgam+=(+r.sakgam||0); sugeum+=(+r.sugeum||0); byeon+=(+r.byeondongbi||0); nosho+=(+r.nosho||0); yeyak+=(+r.yeyak||0); });
  const n=recent.length;
  const sugeumRate=(tot-sakgam)>0?sugeum/(tot-sakgam):0;
  const sakgamRate=boheom>0?sakgam/boheom:0;
  const noshoRate=yeyak>0?nosho/yeyak:0;
  const nonsalRate=tot>0?nonsal/tot:0;
  const netCashPeriod=sugeum-byeon-(S.gojeongbi/30)*n;   // 기간 순현금(세무적립 제외 단순)
  const netCashDaily=n>0?netCashPeriod/n:0;
  const runway=netCashDaily<0?S.cash/(-netCashDaily*30):Infinity;
  const flags=[];
  if(netCashDaily<0) flags.push('risk');
  if(sugeumRate<S.sugeumTarget) flags.push('risk');
  if(noshoRate>S.noshoWarn) flags.push('risk');
  if(sakgamRate>S.sakgamWarn) flags.push('warn');
  const signal=flags.includes('risk')?'risk':flags.length?'warn':'good';
  let headline, action;
  if(signal==='risk'){
    if(netCashDaily<0){ headline='손익은 흑자여도 영업현금흐름이 순유출 — 유동성 위기 신호'; action='매출채권 회수 책임자 지정, 변동비 구조 즉시 점검'; }
    else if(noshoRate>S.noshoWarn){ headline='노쇼율 '+dyPct(noshoRate)+' 경고선 초과 — 가동률·매출 직접 잠식'; action='피크 요일 리마인드 강화, 노쇼 페널티 정책 검토'; }
    else { headline='수금률 '+dyPct(sugeumRate)+'로 목표 하회 — 운전자본 압박'; action='미수 30일 경과분 우선 회수, 수금 프로세스 재정비'; }
  } else if(signal==='warn'){ headline='삭감률 '+dyPct(sakgamRate)+' — 청구 수익 누수, 제출 전 사전심사 필요'; action='최다 삭감 사유 사전심사 체크리스트 적용'; }
  else { headline='핵심 지표 전반 양호 — 현 운영 기조 유지'; action='정기 모니터링 유지, 별도 개입 불요'; }
  return { signal, days:n, headline, action,
    drivers:[ {k:'수금률',v:dyPct(sugeumRate),bad:sugeumRate<S.sugeumTarget}, {k:'노쇼율',v:dyPct(noshoRate),bad:noshoRate>S.noshoWarn}, {k:'삭감률',v:dyPct(sakgamRate),bad:sakgamRate>S.sakgamWarn}, {k:'비급여',v:dyPct(nonsalRate),bad:false} ],
    metrics:{tot,sugeum,runway,netCashPeriod}, series:recent.slice(-7).map(dyTotal) };
}

/* ----- 샘플 데모 데이터 (명시적 가공 샘플 — 정형외과 의원 14일치, 진단 엔진은 실제로 동작) ----- */
function dySeedDemo(silent){
  if(!silent && Object.keys(dailyData.days).length && !confirm('샘플 14일 데이터를 채웁니다. 같은 날짜의 기존 입력은 덮어쓸 수 있어요. 계속할까요?')) return;
  const z=n=>String(n).padStart(2,'0'), today=new Date();
  for(let i=13;i>=0;i--){
    const dt=new Date(today); dt.setDate(today.getDate()-i);
    if(dt.getDay()===0) continue;                    // 일요일 휴진
    const sat=dt.getDay()===6, load=sat?0.62:1;      // 토요일 진료량 62%
    const w=Math.sin(i*1.1)*0.5+Math.cos(i*0.7)*0.5; // -1~1 자연 변동
    const r={ sinhwan:Math.max(2,Math.round((10+w*3)*load)), jaejin:Math.round((58+w*8)*load) };
    r.yeyak=Math.round((r.sinhwan+r.jaejin)*1.06);
    r.nosho=Math.round(r.yeyak*(0.066+(i%5===0?0.018:0)));     // 노쇼율 ~7% (양호선 근처)
    r.geupyeo=Math.round((4050000+w*350000)*load);
    r.dosu=Math.round((1520000+w*220000)*load);
    r.chunggyeok=Math.round((410000+w*90000)*load);
    r.jusa=Math.round((560000+w*120000)*load);
    r.bojogi=Math.round((300000+w*80000)*load);
    const tot=r.geupyeo+r.dosu+r.chunggyeok+r.jusa+r.bojogi;
    r.boheom=Math.round(r.geupyeo*0.92);
    r.sakgam=Math.round(r.boheom*(0.042+(i%4===0?0.012:-0.006)));  // 삭감률 평균 ~4.2% → '주의' 유발(1단계 쐐기 시연)
    r.sugeum=Math.round((tot-r.sakgam)*0.962);                    // 수금률 96%대 → 양호
    r.byeondongbi=Math.round((1180000+w*120000)*load);            // 변동비 — 순현금 +(런웨이 안정)
    dailyData.days[dt.getFullYear()+'-'+z(dt.getMonth()+1)+'-'+z(dt.getDate())]=r;
  }
  saveDaily(); if(!silent) renderGrid();
}

};

  calendar(){ const acts=[], days=['월','화','수','목','금','토','일'], cnt=[0,0,0,0,0,0,0]; calData.shifts.forEach(s=>(s.wk||[]).forEach((c,i)=>{ if(c&&c!=='-'&&i<7) cnt[i]++; }));
    let mi=0; for(let i=1;i<6;i++) if(cnt[i]<cnt[mi]) mi=i;
    acts.push({sig: cnt[mi]<=Math.ceil(calData.shifts.length*0.5)?'warn':'good', trigger:days[mi]+' '+cnt[mi]+'명', action:days[mi]+'요일 근무 최소 — 인력 배치·예약량 점검'});
    if(typeof taxCal!=='undefined'&&taxCal[0]) acts.push({sig:'warn',trigger:taxCal[0].dday,action:taxCal[0].t+' 임박 — 신고 자료 준비'});
    return acts.slice(0,4);
  }
};
function advisorCard(key){ const acts=(ADVISORS[key]?ADVISORS[key]():[]).filter(Boolean); const sm={good:'b-green',warn:'b-amber',risk:'b-red'};
  if(!acts.length) return `<div class="card span2"><div class="c-head"><div class="c-title"><span class="ci">${ic('night',16)}</span>AI 비서 — 다음 행동</div><span class="badge b-green">이상 없음</span></div><div class="meta">현재 입력 데이터 기준 긴급 액션 없음 — 현 운영 기조 유지. <span class="badge b-gray" style="margin-left:4px">실입력 기반</span></div></div>`;
  const worst=acts.some(a=>a.sig==='risk')?'b-red':acts.some(a=>a.sig==='warn')?'b-amber':'b-green';
  return `<div class="card span2"><div class="c-head"><div class="c-title"><span class="ci">${ic('night',16)}</span>AI 비서 — 다음 행동</div><span class="badge ${worst}">${acts.length} 제안</span></div><div style="display:flex;flex-direction:column;gap:9px;margin-top:4px">${acts.map(a=>`<div style="display:flex;gap:9px;align-items:flex-start"><span class="badge ${sm[a.sig]||'b-gray'}" style="flex-shrink:0;white-space:nowrap">${esc(a.trigger||'')}</span><div style="flex:1;font-size:12px;line-height:1.5;font-weight:600">${esc(a.action||'')}</div></div>`).join('')}</div><div class="c-foot"><span>실입력 데이터 기반 제안 · 참고용</span><span class="badge b-gray">비서</span></div></div>`;
}

/* ===== state ===== */
const LSK = 'aios_glass_layout_v1';
const activeB = {};                 // {boardId:bool}  사이드바 표시
const hidden = {}, order = {}, size = {};  // hidden:{bid:Set} · order:{bid:[id]} · size:{bid:{id:span}}
const boardOrder = [];              // 사이드바 게시판 순서
let   boardNames = {};              // {bid:이름}  이름 변경 오버라이드
const changelog = [];               // [{d,t,msg}]  변경 기록
const snapshots = {};               // {'YYYY-MM-DD': layout}  날짜별 저장본
let   userCards = {};               // {bid:[{id,name,desc,body}]}  사용자가 만든 카드

function resetState(){
  boards.forEach(b=>activeB[b.id]=true);
  Object.keys(cardDefs).forEach(bid=>{
    order[bid] = cardDefs[bid].map(c=>c.id);
    hidden[bid] = new Set(bid==='overview' ? widgets.filter(w=>!w.def).map(w=>w.id) : []);
    size[bid] = {};
  });
  boardOrder.length=0; boards.forEach(b=>boardOrder.push(b.id));
  boardNames = {}; userCards = {};
}
function bName(b){ return (b && boardNames[b.id]) || (b && b.name) || ''; }
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function ucToDef(uc){            // 사용자 카드 → 카드 정의 (본문은 escape)
  return { id:uc.id, name:uc.name, desc:uc.desc||'내가 만든 카드', _user:true, render:()=>
    `<div class="card uc"><div class="c-head"><div class="c-title"><span class="ci">${ic('overview',16)}</span>${esc(uc.name)}</div><span class="badge b-cyan">내 카드</span></div>`+
    (uc.body?`<div class="meta" style="white-space:pre-wrap">${esc(uc.body)}</div>`:`<div class="meta" style="color:var(--ink3)">내용 없음 — 조립·편집에서 편집</div>`)+`</div>` };
}
function allDefs(bid){ return (cardDefs[bid]||[]).concat((userCards[bid]||[]).map(ucToDef)); }

/* ----- 영속화: 현재 레이아웃 직렬화 / 복원 / 저장 ----- */
function curLayout(){
  const hid={}; Object.keys(hidden).forEach(k=>hid[k]=[...hidden[k]]);
  return { activeB:{...activeB}, hidden:hid, order:JSON.parse(JSON.stringify(order)),
           boardOrder:[...boardOrder], boardNames:{...boardNames}, size:JSON.parse(JSON.stringify(size)),
           userCards:JSON.parse(JSON.stringify(userCards)) };
}
function applyLayoutObj(o){            // 저장된 객체를 현재 상태에 검증하며 덮어쓰기 (코드가 보드/카드를 추가해도 안전)
  if(!o) return;
  if(o.activeB) for(const k in activeB) if(k in o.activeB) activeB[k]=!!o.activeB[k];
  boardNames={}; if(o.boardNames) for(const b of boards) if(o.boardNames[b.id]) boardNames[b.id]=o.boardNames[b.id];
  userCards={}; if(o.userCards) for(const bid in o.userCards) if(cardDefs[bid] && Array.isArray(o.userCards[bid]))
    userCards[bid]=o.userCards[bid].filter(u=>u&&u.id).map(u=>({id:u.id,name:u.name||'새 카드',desc:u.desc,body:u.body}));
  if(Array.isArray(o.boardOrder)){
    const known=new Set(boards.map(b=>b.id));
    const kept=o.boardOrder.filter(id=>known.has(id));
    boards.forEach(b=>{ if(!kept.includes(b.id)) kept.push(b.id); });
    boardOrder.length=0; boardOrder.push(...kept);
  }
  for(const bid in cardDefs){
    const all=allDefs(bid).map(c=>c.id);   // 사용자 카드 포함
    if(o.order && o.order[bid]){ const kept=o.order[bid].filter(id=>all.includes(id)); all.forEach(id=>{ if(!kept.includes(id)) kept.push(id); }); order[bid]=kept; }
    if(o.hidden && o.hidden[bid]) hidden[bid]=new Set(o.hidden[bid].filter(id=>all.includes(id)));
    size[bid]={}; if(o.size && o.size[bid]) for(const cid in o.size[bid]) if(all.includes(cid)) size[bid][cid]=o.size[bid][cid];
  }
}
function loadLayout(){
  let o=null; try{ o=JSON.parse(localStorage.getItem(LSK)||'null'); }catch(_){}
  if(!o) return;
  if(Array.isArray(o.changelog)){ changelog.length=0; changelog.push(...o.changelog); }
  if(o.snapshots) Object.assign(snapshots, o.snapshots);
  applyLayoutObj(o);
}
function saveLayout(msg){
  let d,t; try{ const n=new Date(); d=n.toISOString().slice(0,10); t=n.toTimeString().slice(0,5); }catch(_){ d='—'; t='—'; }
  const lay=curLayout();
  if(msg){ changelog.unshift({d,t,msg}); if(changelog.length>60) changelog.length=60; }
  snapshots[d]=lay;
  const ds=Object.keys(snapshots).sort(); while(ds.length>14) delete snapshots[ds.shift()];
  try{ localStorage.setItem(LSK, JSON.stringify({...lay, changelog, snapshots})); }catch(_){}
}
function restoreSnapshot(d){
  const s=snapshots[d]; if(!s) return;
  applyLayoutObj(s);
  saveLayout('“'+d+'” 저장본 복원');
  renderNav(); if(isAsm()) renderGallery(); renderGrid();
}

resetState();
loadLayout();

let cur='overview', claimFilter='all';

function boardCards(bid){
  const defs = allDefs(bid);
  const byId = {}; defs.forEach(c=>byId[c.id]=c);
  return (order[bid]||defs.map(c=>c.id)).map(id=>byId[id]).filter(Boolean).filter(c=>!hidden[bid].has(c.id));
}
function isAsm(){ return document.body.classList.contains('assemble'); }

/* ===== sidebar (게시판 — 넣기/빼기) ===== */
function renderNav(){
  const nav=document.getElementById('nav');
  const asm=isAsm();
  const list = boardOrder.map(id=>boards.find(b=>b.id===id)).filter(b=>b && activeB[b.id]);
  nav.innerHTML = list.map(b=>`
    <div class="nav-item ${b.id===cur?'active':''}" data-board="${b.id}">
      ${ic(b.id,19)}
      <span class="nm"><span class="nm-t" data-rename="${b.id}" title="더블클릭해 이름 변경">${bName(b)}</span><span class="ds">${b.desc}</span></span>
      ${b.badge?`<span class="nav-badge">${b.badge}</span>`:''}
      <button class="nav-x" type="button" aria-label="게시판 숨기기" data-hideboard="${b.id}">${ic('x',13)}</button>
    </div>`).join('');
  nav.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click',e=>{ if(e.target.closest('[data-hideboard]')||e.target.closest('[contenteditable="true"]'))return; go(el.dataset.board); });
  });
  nav.querySelectorAll('[data-rename]').forEach(t=>t.addEventListener('dblclick',e=>{ if(!isAsm())return; e.stopPropagation(); startRename(t); }));
  nav.querySelectorAll('[data-hideboard]').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const id=btn.dataset.hideboard; activeB[id]=false;
    if(cur===id){ const first=list.find(b=>b.id!==id&&activeB[b.id]); go(first?first.id:'settings'); }

/* ----- 사이드바 게시판 순서 반영 (포인터 드래그 콜백) ----- */
function reorderBoards(domIds){
  const before=boardOrder.join(',');
  const visSet=new Set(domIds); let vi=0;
  const merged=boardOrder.map(id=> visSet.has(id) ? domIds[vi++] : id);  // 숨긴 보드 위치 보존
  boardOrder.length=0; boardOrder.push(...merged);
  if(boardOrder.join(',')!==before){ saveLayout('게시판 순서 변경'); renderNav(); }
}

/* ----- 게시판 이름 인라인 변경 ----- */
function startRename(t){
  const item=t.closest('.nav-item'), id=t.dataset.rename, old=t.textContent;
  item.setAttribute('draggable','false');
  t.contentEditable='true'; t.classList.add('editing'); t.focus();
  const sel=window.getSelection(), range=document.createRange(); range.selectNodeContents(t); sel.removeAllRanges(); sel.addRange(range);
  let done=false;
  const finish=(commit)=>{
    if(done)return; done=true;
    t.removeEventListener('blur',onBlur); t.removeEventListener('keydown',onKey);
    t.contentEditable='false'; t.classList.remove('editing'); item.setAttribute('draggable','true');
    const nv=t.textContent.trim(), b=boards.find(x=>x.id===id);
    if(commit && nv && nv!==old){
      if(b && nv===b.name) delete boardNames[id]; else boardNames[id]=nv;
      saveLayout('게시판 이름: '+old+' → '+nv);
    }
    renderNav(); if(isAsm()) renderGallery();
    if(id===cur) document.getElementById('bh-title').textContent=bName(boards.find(x=>x.id===id));
  };
  const onBlur=()=>finish(true);
  const onKey=(e)=>{ if(e.key==='Enter'){e.preventDefault();finish(true);} else if(e.key==='Escape'){e.preventDefault();t.textContent=old;finish(false);} };
  t.addEventListener('blur',onBlur); t.addEventListener('keydown',onKey);
}

function renderChips(){
  const wrap = document.getElementById('chips');
  if(cur==='claims'){
    const opts=[['all','전체'],['high','높음'],['mid','중간'],['low','낮음']];
    wrap.innerHTML = opts.map(([v,t])=>`<span class="chip ${claimFilter===v?'on':''}" data-f="${v}">${t}</span>`).join('');
    wrap.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{claimFilter=c.dataset.f;renderGrid();renderChips();}));
  } else wrap.innerHTML='';
}

/* ===== gallery (게시판 토글 + 현재 보드 카드 토글) ===== */

  const defs = allDefs(cur);

    : `<div class="gi-empty">이 게시판은 토글할 카드가 없습니다.</div>`;
  g.innerHTML = `
    <div class="gal-head"><span><b>게시판</b> — 보이기/숨기기 · 사이드바에서 <b>드래그로 순서 변경</b> · 이름 <b>더블클릭</b></span><button class="chip" id="resetAll" type="button">전체 기본값</button></div>
    <div class="gal-grid">${bsec}</div>
    <div class="gal-head" style="margin-top:15px"><span><b>${curName}</b> 카드 — 넣기/빼기 · 본문에서 <b>드래그로 이동</b> · <b>↔ 버튼</b>으로 너비(1·2·3칸)</span></div>
    ${csec}`;
  g.querySelectorAll('[data-gb]').forEach(it=>it.addEventListener('click',()=>{
    const id=it.dataset.gb; activeB[id]=!activeB[id]; it.classList.toggle('on',activeB[id]);
    saveLayout((activeB[id]?'게시판 표시: ':'게시판 숨김: ')+bName(boards.find(b=>b.id===id)));

  }));
  g.querySelectorAll('[data-gc]').forEach(it=>it.addEventListener('click',()=>{

  document.getElementById('resetAll').addEventListener('click',()=>{ resetState(); saveLayout('전체 기본값으로 초기화'); renderNav(); renderGallery(); renderGrid(); });

function persistOrder(visibleIds){
  const full = (order[cur]||allDefs(cur).map(c=>c.id)).slice();
  const vis = new Set(visibleIds); let vi=0;
  order[cur] = full.map(id=> vis.has(id) ? visibleIds[vi++] : id);
}

/* ===== 포인터 기반 부드러운 드래그 (FLIP) — 그리드/사이드바 공통 ===== */
function sortableAfter(container, sel, x, y, axis){
  const els=[...container.querySelectorAll(sel)].filter(el=>!el.classList.contains('drag-lift'));
  let best={off:-Infinity, el:null};
  els.forEach(el=>{
    const r=el.getBoundingClientRect();
    const off = axis==='y' ? (y-(r.top+r.height/2))
                           : (y-(r.top+r.height/2))*2000 + (x-(r.left+r.width/2));
    if(off<0 && off>best.off) best={off, el};
  });
  return best.el;
}
function flipMove(container, sel, mutate){          // 형제 카드들이 부드럽게 자리를 비켜줌
  const items=[...container.querySelectorAll(sel)].filter(el=>!el.classList.contains('drag-lift'));
  const first=new Map(items.map(el=>[el, el.getBoundingClientRect()]));
  mutate();
  items.forEach(el=>{
    const b=first.get(el); if(!b) return;
    const a=el.getBoundingClientRect();
    const dx=b.left-a.left, dy=b.top-a.top;
    if(dx||dy){
      el.style.transition='none';
      el.style.transform=`translate(${dx}px,${dy}px)`;
      el.getBoundingClientRect();                   // 강제 reflow
      el.style.transition='transform .26s cubic-bezier(.2,.85,.3,1)';
      el.style.transform='';
    }
  });
}
function makeSortable(container, opts){
  const sel=opts.itemSelector, axis=opts.axis||'xy';
  let item=null, ph=null, started=false, sx=0, sy=0, ox=0, oy=0, ptrId=null, swallow=false;
  container.addEventListener('pointerdown', e=>{
    if(!isAsm() || e.button!==0 || item) return;   // item!=null → 이미 드래그 중(재진입 방지)
    const it=e.target.closest(sel);
    if(!it || !container.contains(it)) return;
    if(e.target.closest('button,[contenteditable="true"],input,textarea,a,canvas,select')) return;
    item=it; started=false; sx=e.clientX; sy=e.clientY; ptrId=e.pointerId;
    const r=it.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top;
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up, {once:true});
    window.addEventListener('pointercancel', up, {once:true});
  });
  function begin(){
    started=true; swallow=true;
    const r=item.getBoundingClientRect();
    ph=document.createElement('div'); ph.className='sortable-ph';
    ph.style.width=r.width+'px'; ph.style.height=r.height+'px';
    ph.style.gridColumn = item.style.gridColumn || getComputedStyle(item).gridColumn;
    item.parentNode.insertBefore(ph, item);
    item.classList.add('drag-lift');
    Object.assign(item.style,{width:r.width+'px',height:r.height+'px',position:'fixed',left:'0',top:'0',margin:'0',zIndex:'9999',pointerEvents:'none'});
    document.body.classList.add('dragging-active');
    paint(sx,sy);
    try{ item.setPointerCapture(ptrId); }catch(_){}
  }
  function paint(x,y){ item.style.transform=`translate(${x-ox}px,${y-oy}px) scale(1.03) rotate(.5deg)`; }
  function move(e){
    if(!item) return;
    if(!started){ if(Math.hypot(e.clientX-sx,e.clientY-sy)<6) return; begin(); }
    paint(e.clientX,e.clientY);
    const after=sortableAfter(container, sel, e.clientX, e.clientY, axis);
    if(after!==ph && after!==item){
      flipMove(container, sel, ()=>{ if(after==null) container.appendChild(ph); else container.insertBefore(ph, after); });
    }
  }
  function up(){
    window.removeEventListener('pointermove', move);
    const el=item, p=ph, was=started; item=null; ph=null; started=false;
    if(!was) return;                                // 단순 클릭 — 드롭 아님
    const pr=p.getBoundingClientRect();
    el.style.transition='transform .2s cubic-bezier(.2,.85,.3,1)';
    el.style.transform=`translate(${pr.left}px,${pr.top}px) scale(1)`;
    let settled=false;
    const finish=()=>{
      if(settled) return; settled=true;
      el.removeEventListener('transitionend', finish);
      ['transition','transform','position','left','top','margin','zIndex','pointerEvents','width','height'].forEach(k=>el.style[k]='');
      el.classList.remove('drag-lift');
      document.body.classList.remove('dragging-active');
      if(p.parentNode){ p.parentNode.insertBefore(el, p); p.remove(); }
      opts.onReorder([...container.querySelectorAll(sel)]);
      setTimeout(()=>{ swallow=false; }, 0);
    };
    el.addEventListener('transitionend', finish);
    setTimeout(finish, 240);                        // transitionend 누락 안전장치
  }
  container.addEventListener('click', e=>{ if(swallow){ e.stopPropagation(); e.preventDefault(); } }, true);
}

/* ===== grid (모든 보드 공통 · 삭제·이동) ===== */
function renderGrid(){
  const grid = document.getElementById('grid');
  let list = boardCards(cur);
  if(cur==='claims' && claimFilter!=='all') list = list.filter(c=>c.lv===claimFilter);
  const asm=isAsm();
  grid.innerHTML = list.map(c=>c.render()).join('');
  [...grid.children].forEach((el,i)=>{
    const c=list[i]; if(!c)return;
    el.style.animationDelay=(i*40)+'ms';
    el.dataset.card=c.id;
    if(c.init) c.init(el);
    const base = el.classList.contains('span2') ? 2 : 1;
    const ov = size[cur] && size[cur][c.id];
    if(ov){ el.style.gridColumn='span '+ov; }
    const x=document.createElement('button');
    x.className='x-btn'; x.type='button'; x.setAttribute('aria-label','카드 제거'); x.innerHTML=ic('x',14);
    x.addEventListener('click',e=>{ e.stopPropagation(); hidden[cur].add(c.id); saveLayout('카드 제거: '+(c.name||c.id)); renderGrid(); if(isAsm())renderGallery(); });
    el.appendChild(x);
    if(asm){
      const eff = ov || base;
      const nextW = eff>=3 ? 1 : eff+1;
      const r=document.createElement('button');
      r.className='r-btn'; r.type='button'; r.setAttribute('aria-label','카드 너비 변경');
      r.title='너비 '+eff+'칸 → '+nextW+'칸';
      r.innerHTML=ic('resize',13)+'<span>'+eff+'칸</span>';
      r.addEventListener('click',e=>{ e.stopPropagation();
        size[cur]=size[cur]||{};
        if(nextW===base) delete size[cur][c.id]; else size[cur][c.id]=nextW;
        saveLayout('카드 너비 '+nextW+'칸: '+(c.name||c.id));
        renderGrid();
      });
      el.appendChild(r);
    }
  });
  if(!list.length && !asm){ grid.innerHTML='<div class="card">표시할 카드가 없습니다 · 조립·편집(우상단)에서 켜 주세요.</div>'; return; }
  if(asm) grid.appendChild(buildTray());
}

/* ===== 조립 트레이 (새 카드 + 숨긴 카드 복원) ===== */
function buildTray(){
  const tray=document.createElement('div'); tray.className='card tray-card';
  const hiddenDefs=allDefs(cur).filter(c=>hidden[cur].has(c.id));
  const restoreHTML = hiddenDefs.length
    ? `<div class="tray-sec"><div class="tray-h">${ic('sync',13)}<span>숨긴 카드 ${hiddenDefs.length} · 눌러서 되돌리기</span></div><div class="tray-chips">${hiddenDefs.map(c=>`<button class="tray-chip" type="button" data-restore-card="${c.id}">${esc(c.name||c.id)}</button>`).join('')}</div></div>`
    : `<div class="tray-sec"><div class="tray-h" style="color:var(--ink3)">${ic('sync',13)}<span>숨긴 카드 없음</span></div></div>`;
  tray.innerHTML = `<button class="tray-new" type="button" data-new-card>${ic('overview',18)}<span>+ 새 카드 만들기</span></button>${restoreHTML}`;
  tray.querySelector('[data-new-card]').addEventListener('click',openCardCreate);
  tray.querySelectorAll('[data-restore-card]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.dataset.restoreCard; hidden[cur].delete(id);
    const c=allDefs(cur).find(x=>x.id===id);
    saveLayout('카드 되돌리기: '+(c?(c.name||c.id):id)); renderGrid(); if(isAsm())renderGallery();
  }));
  return tray;
}

/* ===== 새 카드 만들기 모달 ===== */
function openCardCreate(){
  const bid=cur;
  let host=document.getElementById('cardModal');
  if(!host){ host=document.createElement('div'); host.id='cardModal'; host.className='modal-wrap'; document.body.appendChild(host); }
  const bn=esc(bName(boards.find(b=>b.id===bid)||{name:'현재 보드'}));
  host.innerHTML=`<div class="modal-bg" data-x></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="새 카드 만들기">
      <button class="modal-x" type="button" data-x aria-label="닫기">${ic('x',16)}</button>
      <div class="rs-name" style="margin-bottom:4px">새 카드 만들기</div>
      <div class="meta" style="margin-bottom:14px"><b>${bn}</b> 보드에 추가됩니다.</div>
      <label class="cc-l">제목</label>
      <input class="cc-in" id="cc-t" type="text" maxlength="40" placeholder="예: 오늘의 메모">
      <label class="cc-l">내용</label>
      <textarea class="cc-in" id="cc-b" rows="4" maxlength="600" placeholder="자유 메모 · 줄바꿈 가능"></textarea>
      <label class="cc-l">너비</label>
      <div class="cc-w" id="cc-w">${[1,2,3].map(n=>`<button type="button" data-w="${n}" class="${n===1?'on':''}">${n}칸</button>`).join('')}</div>
      <div class="cc-actions"><button class="chip" type="button" data-x>취소</button><button class="cc-go" type="button" data-go>카드 추가</button></div>
    </div>`;
  host.hidden=false; document.body.classList.add('modal-open');
  let w=1;
  host.querySelectorAll('#cc-w button').forEach(b=>b.addEventListener('click',()=>{ w=+b.dataset.w; host.querySelectorAll('#cc-w button').forEach(x=>x.classList.toggle('on',x===b)); }));
  const close=()=>{ host.hidden=true; document.body.classList.remove('modal-open'); };
  host.querySelectorAll('[data-x]').forEach(b=>b.addEventListener('click',close));
  host.querySelector('[data-go]').addEventListener('click',()=>{
    const name=(host.querySelector('#cc-t').value||'').trim()||'새 카드';
    const body=(host.querySelector('#cc-b').value||'').trim();
    const id='uc_'+Date.now().toString(36);
    userCards[bid]=userCards[bid]||[]; userCards[bid].push({id,name,body});
    order[bid]=order[bid]||allDefs(bid).map(c=>c.id); if(!order[bid].includes(id)) order[bid].push(id);
    if(hidden[bid]) hidden[bid].delete(id);
    if(w>1){ size[bid]=size[bid]||{}; size[bid][id]=w; }
    saveLayout('새 카드 추가: '+name);
    close(); renderGrid(); if(isAsm())renderGallery();
  });
  setTimeout(()=>{ const i=host.querySelector('#cc-t'); if(i)i.focus(); },30);
}

/* ===== navigation ===== */
function go(id){
  cur = id;
  const b = boards.find(x=>x.id===id) || {name:'설정',sub:'권한 · 가명처리 · 알림',id:'settings'};
  document.getElementById('bh-title').textContent = bName(b);
  document.getElementById('bh-sub').textContent = b.sub || '';
  document.getElementById('bh-ic').innerHTML = ic(b.id,18);
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.board===id));
  renderChips();
  if(isAsm()) renderGallery();
  renderGrid();
}

/* ===== init ===== */
/* ===== 직원 이력서 모달 ===== */
function openResume(name){
  const s=staff.find(x=>x.n===name), r=resumes[name]; if(!r)return;
  document.getElementById('resumeCard').innerHTML=`
    <button class="modal-x" type="button" aria-label="닫기" onclick="closeResume()">${ic('x',16)}</button>
    <div class="rs-head"><div class="av-lg" style="width:48px;height:48px;border-radius:14px;background:${s?s.c:'var(--cyan)'}">${name.charAt(0)}</div>
      <div style="flex:1;min-width:0"><div class="rs-name">${name}</div><div class="rs-role">${s?s.r:''}</div></div>
      ${s?`<span class="badge ${s.att[1]}">${s.att[0]}</span>`:''}</div>
    <div class="rs-grid">
      <div class="rs-item"><div class="rs-l">입사 · 근속</div><div class="rs-v">${r.join} · ${r.tenure}</div></div>
      <div class="rs-item"><div class="rs-l">담당</div><div class="rs-v">${r.duty}</div></div>
      <div class="rs-item"><div class="rs-l">학력</div><div class="rs-v">${r.edu}</div></div>
      <div class="rs-item"><div class="rs-l">연락처</div><div class="rs-v">${r.phone}<span class="rs-mask">마스킹</span></div></div>
    </div>
    <div class="rs-sec"><div class="rs-l">면허 · 자격</div><div class="rs-tags">${r.lic.map(l=>`<span class="rs-tag">${l}</span>`).join('')}</div></div>
    <div class="rs-sec"><div class="rs-l">경력</div><ul class="rs-career">${r.career.map(c=>`<li>${c}</li>`).join('')}</ul></div>
    <div class="rs-note"><span class="badge b-amber" style="flex-shrink:0">개인정보 주의</span><span>직원 이력서 — 데모는 가명·전화 마스킹·주민번호 미수집. 실제는 본인 동의·최소권한 접근통제·접근로그 필수(개인정보보호법).</span></div>`;
  document.getElementById('resumeModal').hidden=false; document.body.classList.add('modal-open');
}
function closeResume(){ const m=document.getElementById('resumeModal'); if(m)m.hidden=true; document.body.classList.remove('modal-open'); }
document.getElementById('resumeBg').addEventListener('click',closeResume);
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeResume(); const cm=document.getElementById('cardModal'); if(cm && !cm.hidden){ cm.hidden=true; document.body.classList.remove('modal-open'); } } });

/* 부드러운 포인터 드래그 연결 (조립 모드에서만 작동) */
makeSortable(document.getElementById('grid'), { itemSelector:'.card[data-card]', axis:'xy', onReorder:(els)=>{
  const ids=els.map(el=>el.dataset.card).filter(Boolean);
  const before=JSON.stringify(order[cur]||[]);
  persistOrder(ids);
  if(JSON.stringify(order[cur]||[])!==before){ const cb=boards.find(b=>b.id===cur); saveLayout('카드 이동: '+(cb?bName(cb):cur)); }
}});
makeSortable(document.getElementById('nav'), { itemSelector:'.nav-item', axis:'y', onReorder:(els)=>{
  reorderBoards(els.map(el=>el.dataset.board).filter(Boolean));
}});

renderNav();
document.getElementById('ic-settings').innerHTML = ic('settings',19);
document.querySelector('.side-foot .nav-item').addEventListener('click',()=>go('settings'));
document.getElementById('ic-search').innerHTML = ic('search',16);
document.getElementById('ic-bell').innerHTML = ic('bell',18);
document.getElementById('ic-asm').innerHTML = ic('grid',17);
document.getElementById('asmBtn').addEventListener('click',()=>{
  const on=document.body.classList.toggle('assemble');
  document.getElementById('asmBtn').classList.toggle('on',on);
  document.getElementById('gallery').classList.toggle('show',on);
  if(on) renderGallery();
  renderNav();
  renderGrid();
});

/* 테마 전환 (시스템 / 라이트 / 다크) — 클로드식 세그먼트, localStorage 저장 */
(function(){
  const TKEY='aios_glass_theme', mq=window.matchMedia('(prefers-color-scheme: dark)');
  const seg=document.getElementById('themeSeg');
  const icons={system:'mon',light:'sun',dark:'moon'};
  seg.querySelectorAll('.ts-btn').forEach(b=>{ b.innerHTML=ic(icons[b.dataset.themePref],16); });
  const getPref=()=>{ try{ return localStorage.getItem(TKEY)||'system'; }catch(_){ return 'system'; } };
  function apply(){
    const pref=getPref(), resolved = pref==='system' ? (mq.matches?'dark':'light') : pref;
    document.documentElement.setAttribute('data-theme', resolved);
    seg.querySelectorAll('.ts-btn').forEach(b=>b.classList.toggle('on', b.dataset.themePref===pref));
  }
  seg.querySelectorAll('.ts-btn').forEach(b=>b.addEventListener('click',()=>{ try{ localStorage.setItem(TKEY,b.dataset.themePref); }catch(_){ } apply(); }));
  mq.addEventListener('change',()=>{ if(getPref()==='system') apply(); });
  apply();
})();
go('overview');
</script>
